<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Challenge - Contact</title>
    
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <link rel="stylesheet" href="../style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body class="contact-page">

        <img src="../images/logo_backwhite.svg"
         class="contact-bg-image"
         alt="">

<header class="header-nav at-top" id="main-nav">
        <button class="mobile-menu-btn" aria-label="메뉴 열기">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="logo-box">
            <a href="/">
                <img src="../images/logo.svg" alt="Next Challenge Logo">
            </a>
        </div>
        
        <nav class="menu-box">
            <div class="mobile-close-zone">
                <button class="menu-close-btn" aria-label="메뉴 닫기">&times;</button>
            </div>

            <div class="menu-content-panel">
                <ul class="menu-list">
                    <li><a href="/">ABOUT</a></li>
                    <li><a href="/portfolio/">PORTFOLIO</a></li>
                    <li><a href="/work/">WORK</a></li>
                    <li><a href="/contact/" class="active" >CONTACT</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container contact-main">
        <h1 class="page-title hero-reveal">CONTACT</h1>

        <p class="contact-desc hero-reveal">
            Next level with Next Challenge.
        </p>

        <div class="contact-line hero-reveal"></div>

<form
    action="https://formspree.io/f/mdarnwbr"
    method="POST"
    class="contact-form"
>
<div class="contact-form-wrapper hero-reveal">
    <div class="form-group ">
        <label for="name">기업명/담당자 성함 (Company/Name)</label>
        <input
            type="text"
            id="name"
            name="name"
            required
        >
    </div>

    <div class="form-group">
        <label for="tel">연락처 (Phone)</label>
        <input
            type="tel"
            id="tel"
            name="tel"
            required
        >
    </div>

    <div class="form-group">
        <label for="email">이메일 (E-mail)</label>
        <input
            type="email"
            id="email"
            name="email"
            required
        >
    </div>

    <div class="form-group">
        <label for="details">상세 내용 (Details)</label>
        <textarea
            id="details"
            name="details"
            rows="8"
            required
        ></textarea>

            <p class="details-note">
                접수 후 1~2영업일 내에 담당자가 연락드립니다.
            </p>

    </div>

    <button type="submit">
        접수
    </button>
</div>


</form>
    </main>

        <footer class="site-footer">
                <div class="footer-container">
                    <div class="footer-left">
                        <img src="../images/logo.svg" alt="Next Challenge Logo">
                    </div>
                    
                    <div class="footer-right">
                        <p>NEXT CHALLENGE</p>
                        <p>Brand Experience Agency</p>
                        <p>Operations · Production · Direction · Strategy</p>
                        <p>Email : MJ@nextchallenge.kr  ┃  Tel : 010-5565-6079</p> 
                    </div>
                </div>
            </footer> 

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const header = document.querySelector('.header-nav');
        
        if (header) {
            // 사이트가 새로고침 되었을 때 이미 스크롤이 내려가 있는 상태인지 체크하는 함수
            function checkScroll() {
                // 💡 50px 이상 스크롤을 내렸다면 .scrolled 클래스를 붙이고, 맨 위라면 뗍니다.
                if (window.scrollY > 50) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            }

            // 1) 스크롤 할 때마다 실시간 체크
            window.addEventListener('scroll', checkScroll);
            
            // 2) 페이지 처음 들어왔을 때(혹은 새로고침 했을 때) 위치 체크
            checkScroll();
        }
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 1. GSAP 애니메이션 (동작에 필요한 플러그인 등록 및 실행)
        if (typeof gsap !== "undefined") {
            gsap.registerPlugin(ScrollTrigger);

            // 첫 화면 히어로 배너 효과
            gsap.fromTo(".hero-reveal", 
                { opacity: 0, y: 50 }, 
                { opacity: 1, y: 0, duration: 1.5, stagger: 0.2, ease: "power2.out" }
            );

            // 스크롤 시 순차적으로 나타나는 효과
            gsap.utils.toArray(".reveal-item").forEach((item) => {
                gsap.fromTo(item, 
                    { opacity: 0, y: 50 }, 
                    { 
                        opacity: 1, y: 0, duration: 1,
                        scrollTrigger: {
                            trigger: item,
                            start: "top 85%",
                            toggleActions: "play none none none"
                        }
                    }
                );
            });
        }

        // 2. 상단바 스크롤 감지 효과
        const header = document.querySelector('.header-nav');
        if (header) {
            function checkScroll() {
                if (window.scrollY > 50) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            }
            window.addEventListener('scroll', checkScroll);
            checkScroll(); // 초기 위치 체크
        }
    });
</script>

<script>
        document.addEventListener("DOMContentLoaded", () => {
            const mobileBtn = document.querySelector(".mobile-menu-btn");
            const closeBtn = document.querySelector(".menu-close-btn");
            const closeZone = document.querySelector(".mobile-close-zone");
            const menuBox = document.querySelector(".menu-box");

            // 1) 메뉴 열기 (브라우저 주소에 가상의 #menu를 추가함)
            if (mobileBtn && menuBox) {
                mobileBtn.addEventListener("click", () => {
                    menuBox.classList.add("active");
                    history.pushState({ menuOpen: true }, "", "#menu");
                });
            }

            // 2) 메뉴 닫기 함수 (X버튼이나 빈 공간 누를 때)
            const closeMenu = () => {
                if(menuBox && menuBox.classList.contains("active")) {
                    menuBox.classList.remove("active");
                    if(window.location.hash === "#menu") {
                        history.back(); // 주소창 원상복구
                    }
                }
            };

            if (closeBtn) closeBtn.addEventListener("click", closeMenu);
            if (closeZone) closeZone.addEventListener("click", closeMenu);

            // 3) 💡 휴대폰 '뒤로 가기' 버튼을 눌렀을 때 감지하여 창 닫기
            window.addEventListener("popstate", (e) => {
                if (menuBox && menuBox.classList.contains("active")) {
                    menuBox.classList.remove("active");
                }
            });
        });
    </script>

</body>
</html>
